services:
  - type: web
    name: fastapi-2
    env: python
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPEN_ROUTER_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false